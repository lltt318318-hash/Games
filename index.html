<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的专属自测刷题本</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f5f7fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1, h2 { text-align: center; color: #2c3e50; }
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: #e0e0e0;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        textarea {
            width: 100%;
            height: 180px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: monospace;
            margin-bottom: 15px;
        }
        button.main-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button.main-btn:hover { opacity: 0.9; }
        /* 答题区样式 */
        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-inner {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s;
        }
        .question-card {
            margin-bottom: 20px;
        }
        .question-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .options-list {
            list-style: none;
            padding: 0;
        }
        .option-item {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 12px 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-item:hover {
            border-color: var(--primary-color);
            background: #f1f7ff;
        }
        .option-item.correct {
            background: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
        }
        .option-item.wrong {
            background: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }
        .result-box {
            text-align: center;
            padding: 20px;
        }
        /* 错题本样式 */
        .wrong-item {
            border-left: 4px solid var(--error-color);
            background: #fff5f5;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 8px 8px 0;
        }
        .wrong-meta {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        .clear-btn {
            background: var(--error-color);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('upload')">📤 上传题目</button>
        <button class="tab-btn" onclick="switchTab('quiz')">✍️ 开始刷题</button>
        <button class="tab-btn" onclick="switchTab('wrong-book')">❌ 错题本 (<span id="wrong-count">0</span>)</button>
    </div>

    <!-- 上传面板 -->
    <div id="upload-panel" class="panel active">
        <h2>导入题目数据</h2>
        <p style="color: #666; font-size: 14px;">请在下方粘贴符合 JSON 格式的题目数据（可以利用 AI 帮你把题库转成这个格式）：</p>
        <textarea id="json-input" placeholder='[
  {
    "title": "在 Java 中，以下哪个关键字用于创建类的实例？",
    "options": ["new", "class", "instance", "import"],
    "answer": "new"
  }
]'></textarea>
        <button class="main-btn" onclick="importQuestions()">确认导入并开始乱序刷题</button>
    </div>

    <!-- 刷题面板 -->
    <div id="quiz-panel" class="panel">
        <div class="progress-bar"><div id="progress" class="progress-inner"></div></div>
        <div id="quiz-container">
            <!-- 题目动态加载区 -->
        </div>
    </div>

    <!-- 错题本面板 -->
    <div id="wrong-book-panel" class="panel">
        <h2>我的错题本 <button class="clear-btn" onclick="clearWrongBook()">清空错题</button></h2>
        <div id="wrong-list">
            <!-- 错题动态加载区 -->
        </div>
    </div>
</div>

<script>
    let allQuestions = []; // 原始题目
    let quizQuestions = []; // 当前乱序后的刷题库
    let currentIndex = 0; // 当前题号
    let wrongBook = JSON.parse(localStorage.getItem('wrongBook')) || []; // 从浏览器缓存读取错题

    // 页面初始化
    updateWrongCount();

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        
        if(tab === 'upload') {
            document.querySelector('[onclick="switchTab(\'upload\')"]').classList.add('active');
            document.getElementById('upload-panel').classList.add('active');
        } else if(tab === 'quiz') {
            document.querySelector('[onclick="switchTab(\'quiz\')"]').classList.add('active');
            document.getElementById('quiz-panel').classList.add('active');
            if(quizQuestions.length === 0 && allQuestions.length > 0) {
                initQuiz();
            } else if (allQuestions.length === 0) {
                document.getElementById('quiz-container').innerHTML = '<p style="text-align:center;color:#999;">请先在“上传题目”页面导入题库！</p>';
            }
        } else if(tab === 'wrong-book') {
            document.querySelector('[onclick="switchTab(\'wrong-book\')"]').classList.add('active');
            document.getElementById('wrong-book-panel').classList.add('active');
            renderWrongBook();
        }
    }

    // 导入题目
    function importQuestions() {
        const input = document.getElementById('json-input').value.trim();
        if(!input) return alert('请输入题目数据！');
        try {
            allQuestions = JSON.parse(input);
            if(!Array.isArray(allQuestions)) throw new Error();
            alert(`成功导入 ${allQuestions.length} 道题目！自动跳转至乱序刷题界面。`);
            initQuiz();
            switchTab('quiz');
        } catch (e) {
            alert('JSON 格式有误，请检查。确保方括号、双引号和逗号闭合正确！');
        }
    }

    // 洗牌算法（乱序）
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // 初始化刷题
    function initQuiz() {
        // 深拷贝一份题目并打乱顺序
        quizQuestions = shuffle(JSON.parse(JSON.stringify(allQuestions)));
        currentIndex = 0;
        showQuestion();
    }

    // 显示当前题目
    function showQuestion() {
        const container = document.getElementById('quiz-container');
        if (currentIndex >= quizQuestions.length) {
            container.innerHTML = `
                <div class="result-box">
                    <h2>🎉 答题完成！</h2>
                    <p>你已经刷完了本次生成的 ${quizQuestions.length} 道乱序题目。</p>
                    <button class="main-btn" onclick="initQuiz()" style="width:auto; padding: 10px 20px;">再来一轮乱序刷题</button>
                </div>
            `;
            document.getElementById('progress').style.width = '100%';
            return;
        }

        // 更新进度条
        const percent = (currentIndex / quizQuestions.length) * 100;
        document.getElementById('progress').style.width = `${percent}%`;

        const q = quizQuestions[currentIndex];
        
        // 渲染题目和选项 (同时把选项也随机打乱)
        let optionsHtml = '';
        const shuffledOptions = shuffle([...q.options]);

        shuffledOptions.forEach(opt => {
            optionsHtml += `<li class="option-item" onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}', '${q.answer.replace(/'/g, "\\'")}')">${opt}</li>`;
        });

        container.innerHTML = `
            <div class="question-card">
                <div style="color:#888; font-size:14px; margin-bottom:5px;">第 ${currentIndex + 1} / ${quizQuestions.length} 题</div>
                <div class="question-title">${q.title}</div>
                <ul class="options-list">${optionsHtml}</ul>
            </div>
        `;
    }

    // 检查答案
    function checkAnswer(element, selected, correct) {
        // 禁用当前所有选项，防止重复点击
        const items = document.querySelectorAll('.option-item');
        items.forEach(item => item.style.pointerEvents = 'none');

        const currentQuestion = quizQuestions[currentIndex];

        if (selected === correct) {
            element.classList.add('correct');
        } else {
            element.classList.add('wrong');
            // 高亮正确答案
            items.forEach(item => {
                if(item.innerText === correct) item.classList.add('correct');
            });
            // 记入错题本（去重）
            if(!wrongBook.some(w => w.title === currentQuestion.title)) {
                wrongBook.push(currentQuestion);
                localStorage.setItem('wrongBook', JSON.stringify(wrongBook));
                updateWrongCount();
            }
        }

        // 1.5秒后切到下一题
        setTimeout(() => {
            currentIndex++;
            showQuestion();
        }, 1500);
    }

    // 错题本功能
    function updateWrongCount() {
        document.getElementById('wrong-count').innerText = wrongBook.length;
    }

    function renderWrongBook() {
        const container = document.getElementById('wrong-list');
        if(wrongBook.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">太棒了，目前没有错题！</p>';
            return;
        }

        let html = '';
        wrongBook.forEach((q, index) => {
            html += `
                <div class="wrong-item">
                    <div style="font-weight:bold; font-size:16px;">${index + 1}. ${q.title}</div>
                    <div class="wrong-meta">
                        <strong>正确答案：</strong> <span style="color:var(--success-color); font-weight:bold;">${q.answer}</span>
                        <br>
                        <strong>所有备选项：</strong> ${q.options.join(' | ')}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function clearWrongBook() {
        if(confirm('确定要清空错题本吗？')) {
            wrongBook = [];
            localStorage.setItem('wrongBook', JSON.stringify(wrongBook));
            updateWrongCount();
            renderWrongBook();
        }
    }
</script>

</body>
</html>
