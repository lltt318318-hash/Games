<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 坦克大战</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      color: #e5e7eb;
      font-family: "Microsoft YaHei", sans-serif;
    }
    .panel {
      width: min(960px, 100vw);
      padding: 20px;
    }
    .title {
      margin: 0 0 12px;
      text-align: center;
      font-size: 28px;
      color: #fbbf24;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      font-size: 16px;
    }
    .hud span {
      background: rgba(31, 41, 55, 0.9);
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #374151;
    }
    canvas {
      width: 100%;
      max-width: 840px;
      display: block;
      margin: 0 auto;
      background: #0b1220;
      border: 3px solid #4b5563;
      border-radius: 12px;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.35);
    }
    .tips {
      margin: 14px auto 0;
      max-width: 840px;
      line-height: 1.7;
      color: #cbd5e1;
      background: rgba(31, 41, 55, 0.75);
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 12px 14px;
    }
    .tips b { color: #fbbf24; }
  </style>
</head>
<body>
  <div class="panel">
    <h1 class="title">坦克大战</h1>
    <div class="hud">
      <span id="score">分数：0</span>
      <span id="lives">生命：3</span>
      <span id="enemies">敌军：0</span>
      <span id="state">状态：战斗中</span>
    </div>
    <canvas id="game" width="840" height="600"></canvas>
    <div class="tips">
      <b>操作：</b>WASD 或方向键移动，空格发射，R 重新开始。<br>
      <b>目标：</b>击败所有敌方坦克，注意躲避子弹和砖墙缝隙。
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const enemiesEl = document.getElementById('enemies');
    const stateEl = document.getElementById('state');

    const keys = new Set();
    const world = {
      width: canvas.width,
      height: canvas.height,
      score: 0,
      gameOver: false,
      victory: false,
      totalEnemies: 8,
      walls: [],
      bullets: [],
      tanks: []
    };

    const directions = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    class Wall {
      constructor(x, y, w, h, hp = 3) {
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;
        this.hp = hp;
      }

      draw() {
        ctx.fillStyle = this.hp === 1 ? '#f59e0b' : '#b45309';
        ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.strokeStyle = '#78350f';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.w, this.h);
      }
    }

    class Bullet {
      constructor(x, y, dir, owner) {
        this.x = x;
        this.y = y;
        this.dir = dir;
        this.owner = owner;
        this.radius = 4;
        this.speed = 420;
        this.dead = false;
      }

      update(dt) {
        this.x += this.dir.x * this.speed * dt;
        this.y += this.dir.y * this.speed * dt;

        if (this.x < 0 || this.x > world.width || this.y < 0 || this.y > world.height) {
          this.dead = true;
          return;
        }

        for (const wall of world.walls) {
          if (circleRectCollision(this, wall)) {
            wall.hp -= 1;
            this.dead = true;
            break;
          }
        }

        if (this.dead) {
          world.walls = world.walls.filter(wall => wall.hp > 0);
          return;
        }

        for (const tank of world.tanks) {
          if (tank === this.owner || tank.dead || tank.friendly === this.owner.friendly) {
            continue;
          }
          if (circleRectCollision(this, tank.getBounds())) {
            tank.hit();
            this.dead = true;
            break;
          }
        }
      }

      draw() {
        ctx.beginPath();
        ctx.fillStyle = this.owner.friendly ? '#fef08a' : '#fca5a5';
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    class Tank {
      constructor({ x, y, color, friendly, controls = false }) {
        this.x = x;
        this.y = y;
        this.width = 36;
        this.height = 36;
        this.color = color;
        this.friendly = friendly;
        this.controls = controls;
        this.direction = 'up';
        this.speed = friendly ? 180 : 120;
        this.reload = 0;
        this.reloadTime = friendly ? 0.28 : 0.8;
        this.dead = false;
        this.hp = 1;
        this.changeDirTimer = randomRange(0.8, 2.2);
      }

      getBounds(nextX = this.x, nextY = this.y) {
        return { x: nextX, y: nextY, w: this.width, h: this.height };
      }

      center() {
        return { x: this.x + this.width / 2, y: this.y + this.height / 2 };
      }

      muzzle() {
        const center = this.center();
        if (this.direction === 'up') return { x: center.x, y: this.y - 4 };
        if (this.direction === 'down') return { x: center.x, y: this.y + this.height + 4 };
        if (this.direction === 'left') return { x: this.x - 4, y: center.y };
        return { x: this.x + this.width + 4, y: center.y };
      }

      hit() {
        this.hp -= 1;
        if (this.hp > 0) {
          return;
        }
        this.dead = true;
        if (this.friendly) {
          playerLives -= 1;
          if (playerLives <= 0) {
            world.gameOver = true;
            stateEl.textContent = '状态：失败';
          } else {
            respawnPlayer();
          }
        } else {
          world.score += 100;
        }
      }

      tryMove(dx, dy, dt) {
        const nextX = clamp(this.x + dx * this.speed * dt, 0, world.width - this.width);
        const nextY = clamp(this.y + dy * this.speed * dt, 0, world.height - this.height);
        const bounds = this.getBounds(nextX, nextY);

        if (world.walls.some(wall => rectsIntersect(bounds, wall))) {
          return false;
        }

        for (const tank of world.tanks) {
          if (tank === this || tank.dead) {
            continue;
          }
          if (rectsIntersect(bounds, tank.getBounds())) {
            return false;
          }
        }

        this.x = nextX;
        this.y = nextY;
        return true;
      }

      shoot() {
        if (this.reload > 0 || this.dead || world.gameOver || world.victory) {
          return;
        }
        this.reload = this.reloadTime;
        const start = this.muzzle();
        world.bullets.push(new Bullet(start.x, start.y, directions[this.direction], this));
      }

      update(dt) {
        if (this.dead) {
          return;
        }

        this.reload = Math.max(0, this.reload - dt);

        if (this.controls) {
          let dx = 0;
          let dy = 0;
          if (keys.has('arrowup') || keys.has('w')) {
            dy = -1;
            this.direction = 'up';
          } else if (keys.has('arrowdown') || keys.has('s')) {
            dy = 1;
            this.direction = 'down';
          }
          if (keys.has('arrowleft') || keys.has('a')) {
            dx = -1;
            this.direction = 'left';
          } else if (keys.has('arrowright') || keys.has('d')) {
            dx = 1;
            this.direction = 'right';
          }

          if (dx !== 0 && dy !== 0) {
            dx *= 0.7071;
            dy *= 0.7071;
          }
          this.tryMove(dx, dy, dt);
          return;
        }

        this.changeDirTimer -= dt;
        if (this.changeDirTimer <= 0) {
          this.changeDirTimer = randomRange(0.8, 2.2);
          this.direction = choose(['up', 'down', 'left', 'right']);
          if (Math.random() < 0.45) {
            this.shoot();
          }
        }

        const dir = directions[this.direction];
        const moved = this.tryMove(dir.x, dir.y, dt);
        if (!moved) {
          this.direction = choose(['up', 'down', 'left', 'right']);
        }

        const playerCenter = player.center();
        const myCenter = this.center();
        const sameColumn = Math.abs(playerCenter.x - myCenter.x) < 18;
        const sameRow = Math.abs(playerCenter.y - myCenter.y) < 18;
        const clearShot = !world.walls.some(wall => lineHitsRect(myCenter, playerCenter, wall));

        if (clearShot && (sameColumn || sameRow) && Math.random() < 0.018) {
          if (sameColumn) {
            this.direction = playerCenter.y < myCenter.y ? 'up' : 'down';
          } else {
            this.direction = playerCenter.x < myCenter.x ? 'left' : 'right';
          }
          this.shoot();
        }
      }

      draw() {
        if (this.dead) {
          return;
        }

        ctx.save();
        ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
        const angleMap = { up: 0, right: Math.PI / 2, down: Math.PI, left: -Math.PI / 2 };
        ctx.rotate(angleMap[this.direction]);

        ctx.fillStyle = this.color;
        ctx.fillRect(-18, -18, 12, 36);
        ctx.fillRect(6, -18, 12, 36);
        ctx.fillRect(-14, -12, 28, 24);

        ctx.fillStyle = '#d1d5db';
        ctx.fillRect(-3, -24, 6, 18);

        ctx.beginPath();
        ctx.fillStyle = this.friendly ? '#22c55e' : '#ef4444';
        ctx.arc(0, 0, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function choose(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function rectsIntersect(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function circleRectCollision(circle, rect) {
      const closestX = clamp(circle.x, rect.x, rect.x + rect.w);
      const closestY = clamp(circle.y, rect.y, rect.y + rect.h);
      const dx = circle.x - closestX;
      const dy = circle.y - closestY;
      return dx * dx + dy * dy <= circle.radius * circle.radius;
    }

    function lineHitsRect(from, to, rect) {
      const minX = Math.min(from.x, to.x);
      const maxX = Math.max(from.x, to.x);
      const minY = Math.min(from.y, to.y);
      const maxY = Math.max(from.y, to.y);
      return !(maxX < rect.x || minX > rect.x + rect.w || maxY < rect.y || minY > rect.y + rect.h);
    }

    function createWalls() {
      world.walls = [
        new Wall(140, 110, 140, 24),
        new Wall(420, 110, 140, 24),
        new Wall(280, 210, 24, 140),
        new Wall(540, 220, 24, 140),
        new Wall(140, 390, 160, 24),
        new Wall(420, 410, 180, 24),
        new Wall(360, 300, 120, 24),
        new Wall(120, 250, 24, 110)
      ];
    }

    let player;
    let playerLives = 3;

    function respawnPlayer() {
      player = new Tank({ x: 390, y: 530, color: '#38bdf8', friendly: true, controls: true });
      world.tanks = world.tanks.filter(tank => !tank.friendly);
      world.tanks.push(player);
    }

    function spawnEnemies() {
      const points = [
        { x: 60, y: 40 },
        { x: 210, y: 40 },
        { x: 390, y: 40 },
        { x: 570, y: 40 },
        { x: 740, y: 40 },
        { x: 80, y: 170 },
        { x: 700, y: 170 },
        { x: 700, y: 340 }
      ];

      for (let i = 0; i < world.totalEnemies; i += 1) {
        const point = points[i % points.length];
        const tank = new Tank({ x: point.x, y: point.y, color: '#f97316', friendly: false });
        tank.direction = 'down';
        world.tanks.push(tank);
      }
    }

    function resetGame() {
      world.score = 0;
      world.gameOver = false;
      world.victory = false;
      world.bullets = [];
      world.tanks = [];
      playerLives = 3;
      createWalls();
      respawnPlayer();
      spawnEnemies();
      stateEl.textContent = '状态：战斗中';
      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = `分数：${world.score}`;
      livesEl.textContent = `生命：${playerLives}`;
      enemiesEl.textContent = `敌军：${world.tanks.filter(tank => !tank.friendly && !tank.dead).length}`;
      if (world.victory) {
        stateEl.textContent = '状态：胜利';
      }
    }

    function drawBackground() {
      ctx.fillStyle = '#0b1220';
      ctx.fillRect(0, 0, world.width, world.height);

      ctx.strokeStyle = 'rgba(148, 163, 184, 0.08)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= world.width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, world.height);
        ctx.stroke();
      }
      for (let y = 0; y <= world.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(world.width, y);
        ctx.stroke();
      }
    }

    function drawOverlay() {
      if (!world.gameOver && !world.victory) {
        return;
      }

      ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
      ctx.fillRect(0, 0, world.width, world.height);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#f8fafc';
      ctx.font = 'bold 48px Microsoft YaHei';
      ctx.fillText(world.victory ? '你赢了！' : '游戏结束', world.width / 2, world.height / 2 - 10);
      ctx.font = '24px Microsoft YaHei';
      ctx.fillStyle = '#fbbf24';
      ctx.fillText('按 R 重新开始', world.width / 2, world.height / 2 + 40);
    }

    function update(dt) {
      if (world.gameOver || world.victory) {
        return;
      }

      for (const tank of world.tanks) {
        tank.update(dt);
      }

      for (const bullet of world.bullets) {
        bullet.update(dt);
      }

      world.bullets = world.bullets.filter(bullet => !bullet.dead);
      world.tanks = world.tanks.filter(tank => !tank.dead || tank.friendly);

      if (!world.tanks.some(tank => !tank.friendly && !tank.dead)) {
        world.victory = true;
      }

      updateHud();
    }

    function render() {
      drawBackground();
      for (const wall of world.walls) {
        wall.draw();
      }
      for (const bullet of world.bullets) {
        bullet.draw();
      }
      for (const tank of world.tanks) {
        tank.draw();
      }
      drawOverlay();
    }

    let lastTime = 0;
    function loop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000 || 0, 0.033);
      lastTime = timestamp;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', event => {
      const key = event.key.toLowerCase();
      if ([" ", 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(key) || ['w', 'a', 's', 'd', 'r'].includes(key)) {
        event.preventDefault();
      }
      keys.add(key);
      if (key === ' ') {
        player.shoot();
      }
      if (key === 'r') {
        resetGame();
      }
    });

    window.addEventListener('keyup', event => {
      keys.delete(event.key.toLowerCase());
    });

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
