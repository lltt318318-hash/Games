<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horizon - Offroad Sprint</title>
    <style>
        /* 美式户外极简美学：色彩克制，无衬线字体 */
        :root {
            --bg-color: #1c1c1a; 
            --grass-color: #2c422f; 
            --road-color: #2a2a2a; 
            --car-color: #f3f3f3; 
            --rock-color: #5a5a5a; 
            --text-color: #e5e5e5;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none; /* 防止长按选中文本 */
            touch-action: none; /* 禁用默认的滑动和双击放大行为 */
        }

        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* 保证在手机端等比例缩放 */
            max-width: 100%;
            max-height: 100vh;
        }

        canvas {
            display: block;
            background-color: var(--grass-color);
            border-left: 4px solid #fff;
            border-right: 4px solid #fff;
            /* 自适应缩放 */
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none; /* 防止 UI 挡住触摸 */
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(28, 28, 26, 0.95);
            padding: 30px 20px;
            border: 2px solid var(--text-color);
            display: none;
            width: 80%;
            box-sizing: border-box;
        }

        #game-over h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
            letter-spacing: 4px;
        }

        #game-over p {
            margin: 0 0 20px 0;
            color: #aaa;
            font-size: 14px;
        }

        button {
            background-color: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            width: 100%; /* 按钮变宽，方便手机点击 */
        }

        button:hover {
            background-color: #fff;
            transform: scale(1.05);
        }

        /* 手机端操作提示 */
        #mobile-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="650"></canvas>
        <div id="ui-layer">MILES: <span id="score">0</span></div>
        <div id="mobile-hint">TAP LEFT / RIGHT TO STEER</div>
        <div id="game-over">
            <h1>WRECKED</h1>
            <p>FINAL DISTANCE: <br><span id="final-score">0</span> MILES</p >
            <button onclick="resetGame()">Ride Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');
        const mobileHint = document.getElementById('mobile-hint');

        let gameLoop;
        let isGameOver = false;
        let score = 0;
        let frames = 0;
        let baseSpeed = 4;

        const player = {
            x: 175,
            y: 520,
            width: 50,
            height: 80,
            speed: 7, // 稍微调高了速度，让手机操控更灵敏
            dx: 0
        };

        let obstacles = [];

        // ---------------- 电脑键盘控制 ----------------
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                player.dx = -player.speed;
                mobileHint.style.display = 'none'; // 按下键盘自动隐藏手机提示
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                player.dx = player.speed;
                mobileHint.style.display = 'none';
            }
        });

        document.addEventListener('keyup', (e) => {
            if (
                e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A' ||
                e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D'
            ) {
                player.dx = 0;
            }
        });

        // ---------------- 手机触屏控制 ----------------
        canvas.addEventListener('touchstart', (e) => {
            if (isGameOver) return;
            e.preventDefault(); // 防止屏幕滚动
            
            // 获取触摸点相对于屏幕的位置
            const touchX = e.touches[0].clientX;
            const screenHalf = window.innerWidth / 2;

            if (touchX < screenHalf) {
                player.dx = -player.speed; // 点左半边向左
            } else {
                player.dx = player.speed; // 点右半边向右
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            player.dx = 0; // 松开手指车停下
        }, { passive: false });


        // ---------------- 游戏核心逻辑 ----------------
        function spawnObstacle() {
            if (frames % (Math.max(25, 80 - Math.floor(score / 5))) === 0) {
                let width = Math.random() * 40 + 30; 
                let height = Math.random() * 30 + 30; 
                let x = Math.random() * (canvas.width - width);
                obstacles.push({
                    x: x,
                    y: -height,
                    width: width,
                    height: height,
                    type: Math.random() > 0.5 ? 'rock' : 'wood'
                });
            }
        }

        function drawRoad() {
            ctx.fillStyle = '#2a2a2a'; 
            ctx.fillRect(40, 0, 320, canvas.height);
            
            ctx.fillStyle = '#f3f3f3';
            let lineYOffset = frames * baseSpeed % 60;
            for (let i = -60; i < canvas.height; i += 60) {
                ctx.fillRect(196, i + lineYOffset, 8, 30);
            }
        }

        function drawPlayer() {
            ctx.fillStyle = '#f3f3f3'; 
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#111';
            ctx.fillRect(player.x + 5, player.y + 15, player.width - 10, 20);
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                if (obs.type === 'rock') {
                    ctx.fillStyle = '#5a5a5a';
                } else {
                    ctx.fillStyle = '#3a2a18'; 
                }
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });
        }

        function updatePositions() {
            player.x += player.dx;
            if (player.x < 40) player.x = 40;
            if (player.x + player.width > canvas.width - 40) player.x = canvas.width - player.width - 40;

            let currentSpeed = baseSpeed + (score / 80);

            obstacles.forEach(obs => {
                obs.y += currentSpeed;
            });

            obstacles = obstacles.filter(obs => obs.y < canvas.height);
        }

        function checkCollisions() {
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    return true;
                }
            }
            return false;
        }

        function update() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            frames++;
            if (frames % 10 === 0) {
                score++;
                scoreElement.innerText = score;
            }

            spawnObstacle();
            updatePositions();

            drawRoad();
            drawObstacles();
            drawPlayer();

            if (checkCollisions()) {
                endGame();
            } else {
                gameLoop = requestAnimationFrame(update);
            }
        }

        function endGame() {
            isGameOver = true;
            finalScoreElement.innerText = score;
            gameOverScreen.style.display = 'block';
            cancelAnimationFrame(gameLoop);
        }

        function resetGame() {
            obstacles = [];
            score = 0;
            frames = 0;
            player.x = 175;
            isGameOver = false;
            scoreElement.innerText = score;
            gameOverScreen.style.display = 'none';
            update();
        }

        update();
    </script>
</body>
</html>
